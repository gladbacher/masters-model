# Builds and deploys to GitHub Pages on every push to main.
# The Monday schedule also refreshes the bundled OWGR rankings snapshot first
# (OWGR publishes new rankings on Mondays) and commits it if it changed —
# so the live site keeps itself up to date with no local machine involved.
name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC, after OWGR publishes
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh OWGR rankings (scheduled/manual runs only)
        if: github.event_name != 'push'
        run: |
          npm run update-rankings
          if ! git diff --quiet src/data/owgr.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/owgr.json
            git commit -m "Update OWGR rankings snapshot"
            git push
          fi

      - run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
